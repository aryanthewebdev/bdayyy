<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎪 Neha's Secret Arcade! 🎪</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="secret.css">
</head>
<body>

    <audio id="hatch-audio" src="hatch-sound.mp3" preload="auto" loop></audio>

    <div class="game-container">
        <div class="score-board">
            <h1 id="game-status">Tap the floor to spawn the Dino... 🦖</h1>
            <div id="score-wrapper" class="hidden">Score: <span id="score-val">0</span> 🍎</div>
        </div>
        
        <div class="game-stage" id="gameStage" onclick="triggerDinoSequence()">
            
            <div id="egg" class="egg-sprite hidden" onclick="clickEgg(event)">🥚</div>

            <div id="dino" class="dino-sprite">🦖</div>

            <div id="elephant" class="elephant-sprite hidden">🐘</div>

        </div>
    </div>

    <script src="secret.js"></script>
</body>
</html>
