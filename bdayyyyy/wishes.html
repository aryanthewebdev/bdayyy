<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Someone Special ✨</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="cke.css">
</head>
<body>

    <div class="sticker panda-sticker">🐼</div>
    <div class="sticker cat-sticker">🐱</div>
    <div class="sticker gift-sticker">🎁</div>
    <div class="sticker heart-sticker h1">💖</div>
    <div class="sticker heart-sticker h2">💝</div>
    <div class="sticker icecream-sticker">🍦</div>

    <div class="garland">
        <span class="flag segment-1"></span>
        <span class="flag segment-2"></span>
        <span class="flag segment-3"></span>
        <span class="flag segment-4"></span>
        <span class="flag segment-5"></span>
        <span class="flag segment-6"></span>
    </div>

    <div class="wishes-container">
        
        <div class="text-zone">
            <h2 id="instruction" class="game-font-instruction">✨ TAP TO BLOW THE CANDLES! ✨</h2>
            <h1 id="birthday-greeting" class="glowing-cursive-text hidden">Happy Birthday Neha</h1>
        </div>

        <div class="cake-wrapper" id="cakeContainer" onclick="blowCandle()">
            
            <div class="candle-row">
                <div class="candle c1"><div class="flame" id="f1"></div></div>
                <div class="candle c2"><div class="flame" id="f2"></div></div>
                <div class="candle c3"><div class="flame" id="f3"></div></div>
            </div>
            
            <div class="giant-cake">
                <div class="cake-tier tier-4">
                    <div class="dripping-cream cream-pink"></div>
                    <div class="berry b1">🍓</div><div class="berry b2">🍓</div>
                </div>
                <div class="cake-tier tier-3">
                    <div class="dripping-cream cream-purple"></div>
                    <div class="sprinkle s1"></div><div class="sprinkle s2"></div>
                </div>
                <div class="cake-tier tier-2">
                    <div class="dripping-cream cream-blue"></div>
                    <div class="sprinkle s3"></div><div class="sprinkle s4"></div>
                </div>
                <div class="cake-tier tier-1">
                    <div class="dripping-cream cream-yellow"></div>
                    <div class="sprinkle s5"></div><div class="sprinkle s6"></div>
                </div>
            </div>
            
            <div class="royal-plate"></div>
        </div>

        <div id="next-action" class="hidden">
            <a href="gallery.html" class="cute-bounce-btn">Our Memory Lane ➔</a>
        </div>
    </div>

    <div id="party-container"></div>

    <script src="cke.js"></script>
</body>
</html>
