<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Message From The Heart ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #1b122c 0%, #080410 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fredoka One', cursive;
            overflow: hidden;
            padding: 20px;
        }

        /* The Elegant Message Board Card */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 107, 129, 0.2);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 
                        inset 0 0 20px rgba(255, 107, 129, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            animation: cardEntrance 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        /* The Grand Punchline */
        .punchline {
            font-family: 'Sacramento', cursive;
            font-size: 3.5rem;
            font-weight: bold;
            color: #ff6b81;
            line-height: 1.3;
            margin-bottom: 25px;
            text-shadow: 0 0 20px rgba(255, 107, 129, 0.4);
        }

        /* Tiny Sweet Footnote */
        .sub-text {
            color: #a4b0be;
            font-size: 0.95rem;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .cleaning-emojis {
            font-size: 2.5rem;
            margin-top: 15px;
            display: inline-block;
            animation: bounce 0.6s infinite alternate;
        }

        /* Sophisticated Animations */
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 class="punchline">bahut has li chal jaake jhaadu mar fir bartan maanj</h1>
        <div class="cleaning-emojis">🧹🧼</div>
        <p class="sub-text">Happy 22nd Birthday, Neha! ❤️</p>
    </div>

</body>
</html>
